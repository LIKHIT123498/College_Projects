<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">CampusConnect ERP - Admin</a>
        <div class="d-flex align-items-center gap-3">
            <span id="userName" class="text-white"></span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="row">
        <div class="col-lg-3 mb-3">
            <div class="list-group">
                <button class="list-group-item list-group-item-action" onclick="loadStudents()">Students</button>
                <button class="list-group-item list-group-item-action" onclick="loadTeachers()">Teachers</button>
                <button class="list-group-item list-group-item-action" onclick="loadCourses()">Courses</button>
                <button class="list-group-item list-group-item-action" onclick="loadDepartments()">Departments</button>
                <button class="list-group-item list-group-item-action" onclick="loadAssignments()">Assignments</button>
                <button class="list-group-item list-group-item-action" onclick="loadExams()">Exams</button>
                <button class="list-group-item list-group-item-action" onclick="loadSubmissions()">Submissions</button>
            </div>
            <div class="card mt-4 shadow-sm">
                <div class="card-header">Create Resource</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="section" class="form-label">Resource Type</label>
                        <select id="section" class="form-select" onchange="renderAdminForm()">
                            <option value="course">Course</option>
                            <option value="department">Department</option>
                        </select>
                    </div>
                    <div id="adminForm"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-9">
            <div class="card shadow-sm">
                <div class="card-body table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="../js/common.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
