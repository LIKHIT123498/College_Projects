<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">CampusConnect ERP - Student</a>
        <div class="d-flex align-items-center gap-3">
            <span id="userName" class="text-white"></span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="row">
        <div class="col-lg-3 mb-3">
            <div class="list-group">
                <button class="list-group-item list-group-item-action" onclick="loadCourses()">Courses</button>
                <button class="list-group-item list-group-item-action" onclick="loadAttendance()">Attendance</button>
                <button class="list-group-item list-group-item-action" onclick="loadMarks()">Marks</button>
                <button class="list-group-item list-group-item-action" onclick="loadTimetable()">Timetable</button>
                <button class="list-group-item list-group-item-action" onclick="loadAssignments()">Assignments</button>
                <button class="list-group-item list-group-item-action" onclick="loadSubmissions()">Submissions</button>
            </div>
        </div>
        <div class="col-lg-9">
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-header">Attendance Overview</div>
                        <div class="card-body"><canvas id="attendanceChart"></canvas></div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-header">Marks Overview</div>
                        <div class="card-body"><canvas id="marksChart"></canvas></div>
                    </div>
                </div>
            </div>
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover mb-0">
                            <thead id="tableHead"></thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/common.js"></script>
<script src="../js/student.js"></script>
</body>
</html>
